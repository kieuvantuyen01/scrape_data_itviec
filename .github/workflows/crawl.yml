name: Crawl ITviec Companies

on:
  # 00:00 UTC = 07:00 ICT mỗi ngày
  schedule:
    - cron: '0 0 * * *'
  # Cho phép chạy thủ công từ Actions tab
  workflow_dispatch:

permissions:
  contents: write

# Không chạy song song: tránh race condition khi push
concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  scrape:
    name: 🔍 Crawl & Commit
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout repo ──────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup Python ───────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── Install dependencies ───────────────────────────
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium --with-deps

      # ── Chạy scraper ───────────────────────────────────
      - name: Run scraper
        env:
          CI: 'true'
          SCRAPE_METHOD: 'playwright'
          EXPORT_FORMAT: 'json'
          ITVIEC_USERNAME: ${{ secrets.ITVIEC_USERNAME }}
          ITVIEC_PASSWORD: ${{ secrets.ITVIEC_PASSWORD }}
        run: python scrape.py

      # ── Upload artifacts ───────────────────────────────
      - name: Upload scraped data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraped-data-${{ github.run_id }}
          path: |
            companies_detailed.json
            companies_detailed.csv
          retention-days: 30
          if-no-files-found: warn

      # ── Upload debug HTML (để kiểm tra nếu lỗi) ────────
      - name: Upload debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html-${{ github.run_id }}
          path: debug/
          retention-days: 7
          if-no-files-found: warn

      # ── Commit & Push ──────────────────────────────────
      - name: Commit & push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Kiểm tra có thay đổi không
          CHANGED=$(git status --porcelain companies_detailed.json companies_detailed.csv 2>/dev/null)
          if [ -z "$CHANGED" ]; then
            echo "ℹ️ No changes detected — nothing to commit."
            exit 0
          fi

          git add companies_detailed.json companies_detailed.csv 2>/dev/null || true
          git commit -m "chore: crawl $(date -u +%Y-%m-%d) [skip ci]"

          # Push với retry (tránh race condition)
          for i in 1 2 3; do
            echo "=== Push attempt $i ==="
            git fetch origin main
            if git pull --rebase origin main && git push; then
              echo "✅ Pushed successfully (attempt $i)"
              exit 0
            fi
            echo "⚠️ Attempt $i failed, retrying in 8s..."
            sleep 8
          done

          echo "::error::Failed to push after 3 attempts."
          exit 1
