name: Crawl ITviec Jobs & Companies

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  scrape:
    name: 🔍 Crawl & Commit
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Setup Python ───────────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies (Python)
        run: pip install -r requirements.txt

      # ── Chạy scraper Python (Công ty) ─────────────────
      - name: Run Python Scraper (Companies)
        env:
          CI: 'true'
          SCRAPE_METHOD: 'bs4'
          EXPORT_FORMAT: 'json'
          ITVIEC_USERNAME: ${{ secrets.ITVIEC_USERNAME }}
          ITVIEC_PASSWORD: ${{ secrets.ITVIEC_PASSWORD }}
        run: python scrape.py

      # ── Setup Node.js ──────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Chạy scraper NodeJS (Việc làm) ─────────────────
      - name: Run NodeJS Scraper (Jobs)
        run: |
          cd itviec-scraper
          npm install
          npx playwright install chromium
          npm run scrape:jobs

      # ── Chuẩn bị giao diện web (public) ───────────────
      - name: Build static site
        run: |
          mkdir -p public
          cp itviec-scraper/index.html public/
          cp itviec-scraper/dashboard.html public/
          cp itviec-scraper/companies.html public/
          cp itviec-scraper/itviec-jobs.json public/ || true
          cp companies_detailed.json public/ || true

      # ── Tải Artifact cho GitHub Pages ─────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      # ── Upload artifacts ───────────────────────────────
      - name: Upload scraped data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraped-data-${{ github.run_id }}
          path: |
            companies_detailed.json
            companies_detailed.csv
            itviec-scraper/itviec-jobs.json
          retention-days: 30
          if-no-files-found: warn

      # ── Commit & Push ──────────────────────────────────
      - name: Commit & push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          CHANGED=$(git status --porcelain companies_detailed.json companies_detailed.csv itviec-scraper/itviec-jobs.json 2>/dev/null)
          if [ -z "$CHANGED" ]; then
            echo "ℹ️ No changes detected — nothing to commit."
            exit 0
          fi

          git add companies_detailed.json companies_detailed.csv itviec-scraper/itviec-jobs.json 2>/dev/null || true
          git commit -m "chore: crawl $(date -u +%Y-%m-%d) [skip ci]"

          for i in 1 2 3; do
            echo "=== Push attempt $i ==="
            git fetch origin main
            if git pull --rebase origin main && git push; then
              echo "✅ Pushed successfully (attempt $i)"
              exit 0
            fi
            echo "⚠️ Attempt $i failed, retrying in 8s..."
            sleep 8
          done

          echo "::error::Failed to push after 3 attempts."
          exit 1

  deploy:
    name: 🚀 Deploy to GitHub Pages
    needs: scrape
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
