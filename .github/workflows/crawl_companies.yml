name: Crawl ITviec Companies

on:
  schedule:
    # Chạy lúc 23:30 UTC mỗi Chủ Nhật (tức 06:30 sáng Chủ Nhật giờ Việt Nam)
    - cron: '30 23 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  scrape_companies:
    name: 🏢 Crawl Companies
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies (Python)
        run: pip install -r requirements.txt

      - name: Run Python Scraper (Companies)
        env:
          CI: 'true'
          SCRAPE_METHOD: 'bs4'
          EXPORT_FORMAT: 'json'
          ITVIEC_USERNAME: ${{ secrets.ITVIEC_USERNAME }}
          ITVIEC_PASSWORD: ${{ secrets.ITVIEC_PASSWORD }}
        run: python scrape.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Upload scraped data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: companies-data-${{ github.run_id }}
          path: |
            public/companies_detailed.json
            public/companies_detailed.csv
          retention-days: 30
          if-no-files-found: warn

      - name: Commit & push results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          CHANGED=$(git status --porcelain public/companies_detailed.json public/companies_detailed.csv 2>/dev/null)
          if [ -z "$CHANGED" ]; then
            echo "ℹ️ No changes detected — nothing to commit."
            exit 0
          fi

          git add public/companies_detailed.json public/companies_detailed.csv 2>/dev/null || true
          git commit -m "chore: crawl companies $(date -u +%Y-%m-%d) [skip ci]"

          for i in 1 2 3; do
            echo "=== Push attempt $i ==="
            git fetch origin main
            if git pull --rebase origin main && git push; then
              echo "✅ Pushed successfully (attempt $i)"
              exit 0
            fi
            echo "⚠️ Attempt $i failed, retrying in 8s..."
            sleep 8
          done

          echo "::error::Failed to push after 3 attempts."
          exit 1

  deploy:
    name: 🚀 Deploy to GitHub Pages
    needs: scrape_companies
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
